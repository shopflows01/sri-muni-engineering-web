<div class="space-y-6 max-w-3xl">
  <!-- Header -->
  <div class="flex items-center gap-4 pb-4 border-b border-gray-200">
    <button routerLink="/customers" class="text-gray-400 hover:text-brand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-brand">{{ isEditMode() ? 'Edit Customer' : 'Add New Customer' }}</h1>
      <p class="text-gray-500 text-sm mt-1">{{ isEditMode() ? 'Update customer details' : 'Create a new customer profile' }}</p>
    </div>
  </div>

  <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name *</label>
        <input type="text" formControlName="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm">
        @if (customerForm.get('name')?.touched && customerForm.get('name')?.invalid) {
          <p class="text-brand-danger text-xs mt-1">Please enter the customer name.</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Vendor Code</label>
        <input type="text" formControlName="vendorCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">GSTIN</label>
        <input type="text" formControlName="gstin" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm uppercase">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">State Name</label>
        <input type="text" formControlName="stateName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">State Code</label>
        <input type="text" formControlName="stateCode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm">
      </div>

      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Billing Address</label>
        <textarea formControlName="billingAddress" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm"></textarea>
      </div>
      
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Shipping Address</label>
        <textarea formControlName="shippingAddress" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Pincode</label>
        <input type="text" formControlName="pincode" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm">
      </div>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-200 flex items-center justify-end gap-3">
      <button type="button" routerLink="/customers" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
      <button type="submit" [disabled]="customerForm.invalid || isSaving()" class="px-6 py-2 text-sm font-medium text-white bg-brand rounded-lg hover:bg-brand-light transition-colors disabled:opacity-70 flex items-center gap-2">
        @if (isSaving()) {
          <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        }
        Save Customer
      </button>
    </div>
  </form>
</div>

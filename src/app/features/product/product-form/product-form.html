<div class="space-y-6 max-w-3xl">
  <div class="flex items-center gap-4 pb-4 border-b border-gray-200">
    <button routerLink="/products" class="text-gray-400 hover:text-brand">Back</button>
    <div>
      <h1 class="text-2xl font-bold text-brand">{{ isEditMode() ? 'Edit Product' : 'Add New Product' }}</h1>
    </div>
  </div>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Customer *</label>
        <select formControlName="customerId" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white">
          <option value="">Select a customer</option>
          @for (cust of customers(); track cust.id) {
            <option [value]="cust.id">{{ cust.name }}</option>
          }
        </select>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Part Number *</label>
        <input type="text" formControlName="partNo" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Part Name *</label>
        <input type="text" formControlName="partName" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">HSN/SAC Code</label>
        <input type="text" formControlName="hsnSac" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Unit of Measure</label>
        <input type="text" formControlName="unit" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Rate Per Item *</label>
        <input type="number" step="0.01" min="0" formControlName="ratePerItem" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">GST Percent *</label>
        <input type="number" step="0.1" min="0" max="100" formControlName="gstPercent" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-200 flex justify-end gap-3">
      <button type="button" routerLink="/products" class="px-4 py-2 text-sm bg-white border border-gray-300 rounded-lg">Cancel</button>
      <button type="submit" [disabled]="productForm.invalid || isSaving()" class="px-6 py-2 text-sm text-white bg-brand rounded-lg">Save</button>
    </div>
  </form>
</div>

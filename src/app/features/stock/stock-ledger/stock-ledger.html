<div class="space-y-6">
  <div class="pb-4 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-brand">Stock Ledger</h1>
    <p class="text-gray-500 text-sm mt-1">Manage inward and outward stock</p>
  </div>

  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <div class="flex gap-4 border-b border-gray-200 mb-6">
      <button class="px-4 py-2 font-medium text-brand border-b-2 border-brand">Inward</button>
      <button class="px-4 py-2 font-medium text-gray-500 hover:text-gray-700">Outward</button>
    </div>

    <!-- Basic inward form placeholder for brevity -->
    <div class="space-y-4 max-w-md">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Product ID</label>
        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Inward Qty</label>
        <input type="number" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>
      <button class="bg-brand text-white px-4 py-2 rounded-lg">Save Inward</button>
    </div>
  </div>
</div>

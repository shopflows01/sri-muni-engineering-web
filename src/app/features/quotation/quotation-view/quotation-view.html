<div class="space-y-6">
  <div class="pb-4 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-brand">Quotation</h1>
    <p class="text-gray-500 text-sm mt-1">Preview or download the quotation PDF</p>
  </div>

  @if (errorMessage()) {
    <div class="p-3 bg-red-50 border border-red-100 text-brand-danger text-sm rounded-lg">
      {{ errorMessage() }}
    </div>
  }

  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">Quotation ID</label>
      <input type="text" [value]="quotationId() ?? ''" (input)="quotationId.set($any($event.target).value)" class="w-full max-w-md px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="Enter quotation ID (GUID)">
    </div>

    <div class="flex flex-wrap gap-3">
      <button (click)="preview()" [disabled]="isLoading() || !quotationId()" class="bg-brand text-white px-6 py-2.5 rounded-lg font-medium hover:bg-brand-light transition-colors disabled:opacity-50 text-sm">
        @if (isLoading()) {
          <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Loading...</span>
        } @else {
          Preview PDF
        }
      </button>
      <button (click)="download()" [disabled]="isLoading() || !quotationId()" class="bg-brand-muted text-brand px-6 py-2.5 rounded-lg font-medium hover:bg-brand hover:text-white transition-colors disabled:opacity-50 text-sm">
        Download PDF
      </button>
    </div>
  </div>
</div>

<div class="space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pb-4 border-b border-gray-200">
    <div>
      <h1 class="text-2xl font-bold text-brand">Quotation</h1>
      <p class="text-gray-500 text-sm mt-1">Preview and download the quotation PDF</p>
    </div>
    <button (click)="download()" class="bg-brand text-white px-6 py-2.5 rounded-lg font-medium hover:bg-brand-light transition-colors text-sm">
      Download PDF
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <iframe [src]="safePdfUrl()" class="w-full h-[80vh] border-0"></iframe>
  </div>
</div>

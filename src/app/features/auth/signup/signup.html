<div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-[520px] border border-gray-100">
  <div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-brand-text mb-2">Create an Account</h2>
    <p class="text-gray-500 text-sm">Sign up to get started</p>
  </div>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div class="relative border border-gray-300 rounded-xl focus-within:border-brand focus-within:ring-2 focus-within:ring-brand/20 transition-all">
      <input type="text" formControlName="username" placeholder=" " autocomplete="username" class="peer w-full px-4 pt-6 pb-2 rounded-xl outline-none text-sm bg-transparent">
      <label class="absolute left-4 top-4 text-gray-400 text-sm transition-all duration-200 peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-1.5 peer-focus:text-[11px] peer-focus:text-brand peer-[:not(:placeholder-shown)]:top-1.5 peer-[:not(:placeholder-shown)]:text-[11px] pointer-events-none">Username</label>
    </div>

    <div class="relative border border-gray-300 rounded-xl focus-within:border-brand focus-within:ring-2 focus-within:ring-brand/20 transition-all">
      <input type="password" formControlName="password" placeholder=" " autocomplete="new-password" class="peer w-full px-4 pt-6 pb-2 rounded-xl outline-none text-sm bg-transparent">
      <label class="absolute left-4 top-4 text-gray-400 text-sm transition-all duration-200 peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-focus:top-1.5 peer-focus:text-[11px] peer-focus:text-brand peer-[:not(:placeholder-shown)]:top-1.5 peer-[:not(:placeholder-shown)]:text-[11px] pointer-events-none">Password</label>
    </div>

    @if (errorMessage()) {
      <div class="bg-red-50 text-brand-danger p-3 rounded-lg text-sm text-left border border-red-100 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        {{ errorMessage() }}
      </div>
    }

    <button type="submit" [disabled]="signupForm.invalid || isSubmitting()" class="w-full bg-brand hover:bg-brand-light text-white font-semibold py-3.5 rounded-xl transition-colors duration-200 shadow-lg shadow-brand/25 disabled:opacity-70 flex justify-center items-center text-base mt-2">
      @if (isSubmitting()) {
        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      } @else {
        Sign Up
      }
    </button>

    <div class="text-center pt-2">
      <p class="text-sm text-gray-600">Already have an account? <a routerLink="/login" class="text-brand font-semibold hover:underline">Sign in</a></p>
    </div>
  </form>
</div>

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg border border-gray-100">
  <div class="text-center mb-8">
    <h2 class="text-2xl font-bold text-brand-text mb-2">Create an Account</h2>
    <p class="text-gray-500 text-sm">Sign up to get started</p>
  </div>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5 text-left">Username</label>
      <input type="text" formControlName="username" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm" placeholder="Choose a username" autocomplete="username">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5 text-left">Password</label>
      <input type="password" formControlName="password" class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all text-sm" placeholder="••••••••" autocomplete="new-password">
    </div>

    @if (errorMessage()) {
      <div class="bg-red-50 text-brand-danger p-3 rounded-lg text-sm text-left border border-red-100 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        {{ errorMessage() }}
      </div>
    }

    <button type="submit" [disabled]="signupForm.invalid || isSubmitting()" class="w-full bg-brand hover:bg-brand-light text-white font-medium py-2.5 rounded-lg transition-colors duration-200 shadow-md shadow-brand/20 disabled:opacity-70 flex justify-center items-center">
      @if (isSubmitting()) {
        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      } @else {
        Sign Up
      }
    </button>

    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">Already have an account? <a routerLink="/login" class="text-brand font-medium hover:underline">Sign in</a></p>
    </div>
  </form>
</div>

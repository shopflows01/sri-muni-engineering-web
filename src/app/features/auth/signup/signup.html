<div class="bg-white/80 backdrop-blur-xl p-8 sm:p-12 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white">
  <div class="mb-10">
    <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Create an Account</h2>
    <p class="text-gray-500 mt-2 font-medium">Sign up to get started</p>
  </div>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div class="space-y-1 relative group">
      <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1">Username</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand transition-colors">
          <span class="material-symbols-outlined text-[20px]">person</span>
        </div>
        <input type="text" formControlName="username" placeholder="Enter your username" autocomplete="username" class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl outline-none text-gray-800 focus:bg-white focus:border-brand focus:ring-4 focus:ring-brand/10 transition-all">
      </div>
    </div>


    <div class="space-y-1 relative group">
      <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1">Email</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand transition-colors">
          <span class="material-symbols-outlined text-[20px]">mail</span>
        </div>
        <input type="email" formControlName="email" placeholder="Enter your email address" autocomplete="email" class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl outline-none text-gray-800 focus:bg-white focus:border-brand focus:ring-4 focus:ring-brand/10 transition-all">
      </div>
    </div>

    <div class="space-y-1 relative group">
      <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1">Role</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand transition-colors z-10">
          <span class="material-symbols-outlined text-[20px]">badge</span>
        </div>
        <select formControlName="role" class="w-full pl-11 pr-10 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl outline-none text-gray-800 focus:bg-white focus:border-brand focus:ring-4 focus:ring-brand/10 transition-all appearance-none cursor-pointer">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-400">
          <span class="material-symbols-outlined text-[20px]">expand_more</span>
        </div>
      </div>
    </div>

    <div class="space-y-1 relative group">
      <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1">Password</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-brand transition-colors">
          <span class="material-symbols-outlined text-[20px]">lock</span>
        </div>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="new-password" class="w-full pl-11 pr-4 py-3.5 bg-gray-50/50 border border-gray-200 rounded-xl outline-none text-gray-800 focus:bg-white focus:border-brand focus:ring-4 focus:ring-brand/10 transition-all">
      </div>
    </div>

    @if (errorMessage()) {
      <div class="p-4 bg-red-50/80 border border-red-100 text-red-600 text-sm rounded-xl font-medium flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">error</span>
        {{ errorMessage() }}
      </div>
    }

    <button type="submit" [disabled]="signupForm.invalid || isSubmitting()" class="w-full bg-brand hover:bg-brand-light text-white font-bold py-4 rounded-xl transition-all duration-300 shadow-[0_8px_20px_rgb(26,54,93,0.2)] hover:shadow-[0_8px_25px_rgb(26,54,93,0.3)] hover:-translate-y-0.5 disabled:opacity-70 disabled:hover:translate-y-0 disabled:hover:shadow-[0_8px_20px_rgb(26,54,93,0.2)] flex justify-center items-center text-base mt-2 relative overflow-hidden group">
      @if (isSubmitting()) {
        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      } @else {
        <span class="relative z-10 flex items-center gap-2">Sign Up <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">person_add</span></span>
      }
    </button>

    <div class="text-center pt-4 border-t border-gray-100">
      <p class="text-gray-500 font-medium text-sm">Already have an account? <a routerLink="/login" class="text-brand font-bold hover:text-brand-light transition-colors">Sign in</a></p>
    </div>
  </form>
</div>

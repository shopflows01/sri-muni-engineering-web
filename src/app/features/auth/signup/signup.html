<div class="bg-white p-12 rounded-2xl shadow-xl w-full max-w-[600px] border border-gray-100">
  <div class="text-center mb-10">
    <h2 class="text-3xl font-bold text-brand-text mb-2">Create an Account</h2>
    <p class="text-gray-500">Sign up to get started</p>
  </div>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-7">
    <div class="relative">
      <input type="text" formControlName="username" placeholder=" " autocomplete="username" class="peer w-full px-4 py-4 border border-gray-300 rounded-xl outline-none text-base bg-white focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all">
      <label class="absolute left-3 -top-2.5 px-1 bg-white text-xs text-gray-500 transition-all duration-200 peer-placeholder-shown:top-4 peer-placeholder-shown:left-4 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:left-3 peer-focus:text-xs peer-focus:text-brand peer-focus:bg-white pointer-events-none">Username</label>
    </div>

    <div class="relative">
      <input type="password" formControlName="password" placeholder=" " autocomplete="new-password" class="peer w-full px-4 py-4 border border-gray-300 rounded-xl outline-none text-base bg-white focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all">
      <label class="absolute left-3 -top-2.5 px-1 bg-white text-xs text-gray-500 transition-all duration-200 peer-placeholder-shown:top-4 peer-placeholder-shown:left-4 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-placeholder-shown:bg-transparent peer-focus:-top-2.5 peer-focus:left-3 peer-focus:text-xs peer-focus:text-brand peer-focus:bg-white pointer-events-none">Password</label>
    </div>

    @if (errorMessage()) {
      <div class="bg-red-50 text-brand-danger p-3 rounded-lg text-sm text-left border border-red-100 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        {{ errorMessage() }}
      </div>
    }

    <button type="submit" [disabled]="signupForm.invalid || isSubmitting()" class="w-full bg-brand hover:bg-brand-light text-white font-semibold py-4 rounded-xl transition-colors duration-200 shadow-lg shadow-brand/25 disabled:opacity-70 flex justify-center items-center text-lg">
      @if (isSubmitting()) {
        <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      } @else {
        Sign Up
      }
    </button>

    <div class="text-center pt-2">
      <p class="text-gray-600">Already have an account? <a routerLink="/login" class="text-brand font-semibold hover:underline">Sign in</a></p>
    </div>
  </form>
</div>

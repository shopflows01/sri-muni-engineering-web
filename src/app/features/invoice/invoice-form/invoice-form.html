<div class="space-y-6">
  <div class="pb-4 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-brand">New Invoice</h1>
    <p class="text-gray-500 text-sm mt-1">Create a new invoice</p>
  </div>

  @if (errorMessage()) {
    <div class="p-3 bg-red-50 border border-red-100 text-brand-danger text-sm rounded-lg">
      {{ errorMessage() }}
    </div>
  }

  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <form [formGroup]="invoiceForm" (ngSubmit)="submit()" class="space-y-6">
      <!-- Basic Details -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">Invoice Details</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Invoice No</label>
            <input type="text" formControlName="invoiceNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 209/26-27">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input type="date" formControlName="date" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Customer</label>
            <select formControlName="customerId" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none bg-white">
              <option value="">Select customer</option>
              @for (cust of customers(); track cust.id) {
                <option [value]="cust.id">{{ cust.name }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
            <select formControlName="productId" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none bg-white">
              <option value="">Select product</option>
              @for (prod of products(); track prod.id) {
                <option [value]="prod.id">{{ prod.partNo }} - {{ prod.partName }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">DC Ledger Entry</label>
            <select formControlName="dcLedgerId" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none bg-white">
              <option value="">Select DC entry</option>
              @for (stock of stockItems(); track stock.id) {
                <option [value]="stock.id">DC {{ stock.dcNo }} - {{ stock.partNo }} ({{ stock.inwardQty }})</option>
              }
            </select>
          </div>
        </div>
      </div>

      <!-- Pricing -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">Pricing & Tax</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
            <input type="number" formControlName="quantity" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 7500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Rate (₹)</label>
            <input type="number" step="0.01" formControlName="rate" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 0.50">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">IGST Rate (%)</label>
            <input type="number" formControlName="igstRate" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 18">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CGST Rate (%)</label>
            <input type="number" formControlName="cgstRate" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 9">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SGST Rate (%)</label>
            <input type="number" formControlName="sgstRate" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 9">
          </div>
        </div>
      </div>

      <!-- Order & Delivery Details -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">Order & Delivery Details</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Note No</label>
            <input type="text" formControlName="deliveryNoteNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 1247015132">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Reference No</label>
            <input type="text" formControlName="referenceNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="Reference number">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Buyer's Order No</label>
            <input type="text" formControlName="buyersOrderNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. 7500001004">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Dispatch Doc No</label>
            <input type="text" formControlName="dispatchDocNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="Dispatch document number">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Destination</label>
            <input type="text" formControlName="destination" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. Iss ATJEF05V03">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Terms of Delivery</label>
            <input type="text" formControlName="termsOfDelivery" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="e.g. V CODE GS2521">
          </div>
        </div>
      </div>

      <!-- ASN & EWB -->
      <div>
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">ASN & E-Way Bill</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ASN No</label>
            <input type="text" formControlName="asnNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="Enter ASN number">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">EWB No</label>
            <input type="text" formControlName="ewbNo" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none" placeholder="Enter E-Way Bill number">
          </div>
        </div>
      </div>

      <div class="flex gap-3 pt-4 border-t border-gray-200">
        <button type="submit" [disabled]="isSubmitting()" class="bg-brand text-white px-6 py-2.5 rounded-lg font-medium hover:bg-brand-light transition-colors disabled:opacity-70">
          @if (isSubmitting()) {
            <span class="flex items-center gap-2"><span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span> Creating...</span>
          } @else {
            Create Invoice
          }
        </button>
        <button type="button" (click)="cancel()" class="px-6 py-2.5 rounded-lg font-medium border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

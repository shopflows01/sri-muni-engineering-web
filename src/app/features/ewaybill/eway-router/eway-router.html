<div class="space-y-6">
  <div class="pb-4 border-b border-gray-200">
    <h1 class="text-2xl font-bold text-brand">E-Way Bill Generator</h1>
    <p class="text-gray-500 text-sm mt-1">Generate E-Way Bill JSON for the GST portal</p>
  </div>

  <!-- Invoice Selector -->
  <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
    <label class="block text-sm font-medium text-gray-700 mb-1">Load from Invoice</label>
    <div class="flex gap-3">
      <select [ngModel]="selectedInvoiceId()" (ngModelChange)="selectedInvoiceId.set($event)" class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand focus:border-brand outline-none bg-white">
        <option value="">Select an invoice to auto-populate</option>
        @for (inv of invoices(); track inv.id) {
          <option [value]="inv.id">#{{ inv.invoiceNo }} - {{ inv.customerName }} ({{ inv.totalAmount | number:'1.2-2' }})</option>
        }
      </select>
      <button (click)="onInvoiceSelected()" [disabled]="!selectedInvoiceId()" class="bg-brand text-white px-4 py-2.5 rounded-lg font-medium hover:bg-brand-light transition-colors disabled:opacity-50 text-sm">
        Load
      </button>
    </div>
  </div>

  @if (isLoading()) {
    <div class="flex justify-center py-8">
      <div class="w-8 h-8 border-3 border-brand-muted border-t-brand rounded-full animate-spin"></div>
    </div>
  }

  <!-- Document Details -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">Document Details</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">User GSTIN</label>
        <input type="text" [ngModel]="userGstin()" (ngModelChange)="userGstin.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Supply Type</label>
        <select [ngModel]="supplyType()" (ngModelChange)="supplyType.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-brand outline-none">
          <option value="O">Outward</option>
          <option value="I">Inward</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Sub Supply Type</label>
        <input type="number" [ngModel]="subSupplyType()" (ngModelChange)="subSupplyType.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Doc Type</label>
        <select [ngModel]="docType()" (ngModelChange)="docType.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-brand outline-none">
          <option value="INV">Invoice</option>
          <option value="BIL">Bill of Supply</option>
          <option value="BOE">Bill of Entry</option>
          <option value="CHL">Delivery Challan</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Doc No</label>
        <input type="text" [ngModel]="docNo()" (ngModelChange)="docNo.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Doc Date (DD/MM/YYYY)</label>
        <input type="text" [ngModel]="docDate()" (ngModelChange)="docDate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none" placeholder="DD/MM/YYYY">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Trans Type</label>
        <input type="number" [ngModel]="transType()" (ngModelChange)="transType.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
    </div>
  </div>

  <!-- From Details -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">From (Consignor)</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">GSTIN</label>
        <input type="text" [ngModel]="fromGstin()" (ngModelChange)="fromGstin.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Trade Name</label>
        <input type="text" [ngModel]="fromTrdName()" (ngModelChange)="fromTrdName.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Address Line 1</label>
        <input type="text" [ngModel]="fromAddr1()" (ngModelChange)="fromAddr1.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Address Line 2</label>
        <input type="text" [ngModel]="fromAddr2()" (ngModelChange)="fromAddr2.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Place</label>
        <input type="text" [ngModel]="fromPlace()" (ngModelChange)="fromPlace.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Pincode</label>
        <input type="number" [ngModel]="fromPincode()" (ngModelChange)="fromPincode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">State Code</label>
        <input type="number" [ngModel]="fromStateCode()" (ngModelChange)="fromStateCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Actual From State Code</label>
        <input type="number" [ngModel]="actualFromStateCode()" (ngModelChange)="actualFromStateCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
    </div>
  </div>

  <!-- To Details -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">To (Consignee)</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">GSTIN</label>
        <input type="text" [ngModel]="toGstin()" (ngModelChange)="toGstin.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Trade Name</label>
        <input type="text" [ngModel]="toTrdName()" (ngModelChange)="toTrdName.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Address Line 1</label>
        <input type="text" [ngModel]="toAddr1()" (ngModelChange)="toAddr1.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Address Line 2</label>
        <input type="text" [ngModel]="toAddr2()" (ngModelChange)="toAddr2.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Place</label>
        <input type="text" [ngModel]="toPlace()" (ngModelChange)="toPlace.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Pincode</label>
        <input type="number" [ngModel]="toPincode()" (ngModelChange)="toPincode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">State Code</label>
        <input type="number" [ngModel]="toStateCode()" (ngModelChange)="toStateCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Actual To State Code</label>
        <input type="number" [ngModel]="actualToStateCode()" (ngModelChange)="actualToStateCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
    </div>
  </div>

  <!-- Values -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">Invoice Values</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Total Value</label>
        <input type="number" step="0.01" [ngModel]="totalValue()" (ngModelChange)="totalValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">CGST Value</label>
        <input type="number" step="0.01" [ngModel]="cgstValue()" (ngModelChange)="cgstValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">SGST Value</label>
        <input type="number" step="0.01" [ngModel]="sgstValue()" (ngModelChange)="sgstValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">IGST Value</label>
        <input type="number" step="0.01" [ngModel]="igstValue()" (ngModelChange)="igstValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Cess Value</label>
        <input type="number" step="0.01" [ngModel]="cessValue()" (ngModelChange)="cessValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Non-Advol Val</label>
        <input type="number" step="0.01" [ngModel]="totNonAdvolVal()" (ngModelChange)="totNonAdvolVal.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Other Value</label>
        <input type="number" step="0.01" [ngModel]="othValue()" (ngModelChange)="othValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Total Inv Value</label>
        <input type="number" step="0.01" [ngModel]="totInvValue()" (ngModelChange)="totInvValue.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
    </div>
  </div>

  <!-- Transport Details -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">Transport Details</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Trans Mode</label>
        <select [ngModel]="transMode()" (ngModelChange)="transMode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-brand outline-none">
          <option [value]="1">Road</option>
          <option [value]="2">Rail</option>
          <option [value]="3">Air</option>
          <option [value]="4">Ship</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Distance (km)</label>
        <input type="number" [ngModel]="transDistance()" (ngModelChange)="transDistance.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Transporter Name</label>
        <input type="text" [ngModel]="transporterName()" (ngModelChange)="transporterName.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Transporter ID</label>
        <input type="text" [ngModel]="transporterId()" (ngModelChange)="transporterId.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Transport Doc No</label>
        <input type="text" [ngModel]="transDocNo()" (ngModelChange)="transDocNo.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Transport Doc Date</label>
        <input type="text" [ngModel]="transDocDate()" (ngModelChange)="transDocDate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none" placeholder="DD/MM/YYYY">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Vehicle No</label>
        <input type="text" [ngModel]="vehicleNo()" (ngModelChange)="vehicleNo.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none" placeholder="e.g. KA12AB1234">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Vehicle Type</label>
        <select [ngModel]="vehicleType()" (ngModelChange)="vehicleType.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-brand outline-none">
          <option value="R">Regular</option>
          <option value="O">ODC</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Item Details -->
  <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-sm font-semibold text-gray-500 uppercase mb-4">Item Details</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Main HSN Code</label>
        <input type="text" [ngModel]="mainHsnCode()" (ngModelChange)="mainHsnCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Product Name</label>
        <input type="text" [ngModel]="itemProductName()" (ngModelChange)="itemProductName.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Product Description</label>
        <input type="text" [ngModel]="itemProductDesc()" (ngModelChange)="itemProductDesc.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">HSN Code</label>
        <input type="text" [ngModel]="itemHsnCode()" (ngModelChange)="itemHsnCode.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Quantity</label>
        <input type="number" [ngModel]="itemQuantity()" (ngModelChange)="itemQuantity.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Unit</label>
        <input type="text" [ngModel]="itemQtyUnit()" (ngModelChange)="itemQtyUnit.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Taxable Amount</label>
        <input type="number" step="0.01" [ngModel]="itemTaxableAmount()" (ngModelChange)="itemTaxableAmount.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">SGST Rate</label>
        <input type="number" step="0.01" [ngModel]="itemSgstRate()" (ngModelChange)="itemSgstRate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">CGST Rate</label>
        <input type="number" step="0.01" [ngModel]="itemCgstRate()" (ngModelChange)="itemCgstRate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">IGST Rate</label>
        <input type="number" step="0.01" [ngModel]="itemIgstRate()" (ngModelChange)="itemIgstRate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Cess Rate</label>
        <input type="number" step="0.01" [ngModel]="itemCessRate()" (ngModelChange)="itemCessRate.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Cess Non-Advol</label>
        <input type="number" step="0.01" [ngModel]="itemCessNonAdvol()" (ngModelChange)="itemCessNonAdvol.set($event)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none">
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="sticky bottom-0 bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-3">
    <button (click)="previewJson()" class="bg-brand text-white px-4 py-2.5 rounded-lg font-medium hover:bg-brand-light transition-colors text-sm">
      Preview JSON
    </button>
    <button (click)="downloadJson()" class="bg-brand-muted text-brand px-4 py-2.5 rounded-lg font-medium hover:bg-brand hover:text-white transition-colors text-sm">
      Download JSON
    </button>
    <button (click)="openEwayPortal()" class="bg-brand-success text-white px-4 py-2.5 rounded-lg font-medium hover:opacity-90 transition-opacity text-sm ml-auto">
      Go to E-Way Portal
    </button>
  </div>

  <!-- JSON Preview Modal -->
  @if (showJsonPreview()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm p-4" (click)="closePreview()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[80vh] flex flex-col" (click)="$event.stopPropagation()">
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
          <h3 class="font-semibold text-brand-text">E-Way Bill JSON Preview</h3>
          <button (click)="closePreview()" class="text-gray-400 hover:text-gray-600 p-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
          </button>
        </div>
        <div class="flex-1 overflow-auto p-4">
          <pre class="text-xs text-gray-700 bg-gray-50 p-4 rounded-lg overflow-x-auto whitespace-pre-wrap">{{ generatedJson() }}</pre>
        </div>
        <div class="p-4 border-t border-gray-200 flex gap-3">
          <button (click)="downloadJson()" class="bg-brand text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-brand-light">Download</button>
          <button (click)="closePreview()" class="px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 text-gray-700 hover:bg-gray-50">Close</button>
        </div>
      </div>
    </div>
  }
</div>

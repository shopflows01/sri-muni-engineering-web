<div class="flex h-screen bg-gray-50 overflow-hidden text-gray-800">
  <!-- Desktop Sidebar -->
  <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200">
    <div class="p-6 border-b border-gray-200 flex items-center gap-3">
      <img src="assets/sme-logo.png" alt="SME Logo" class="h-8 object-contain">
    </div>
    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a routerLink="/dashboard" routerLinkActive="bg-brand text-white shadow-md shadow-brand/20" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-muted hover:text-brand transition-all duration-200 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        Dashboard
      </a>
      <a routerLink="/customers" routerLinkActive="bg-brand text-white shadow-md shadow-brand/20" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-muted hover:text-brand transition-all duration-200 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Customers
      </a>
      <a routerLink="/products" routerLinkActive="bg-brand text-white shadow-md shadow-brand/20" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-muted hover:text-brand transition-all duration-200 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
        Products
      </a>
      <a routerLink="/stock" routerLinkActive="bg-brand text-white shadow-md shadow-brand/20" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-muted hover:text-brand transition-all duration-200 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
        Stock Ledger
      </a>
    </nav>
    <div class="p-4 border-t border-gray-200 flex items-center justify-between bg-gray-50/50">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-brand-muted flex items-center justify-center text-brand font-bold shadow-sm">{{ userInitial() }}</div>
        <span class="text-sm font-semibold text-brand-text">{{ userName() }}</span>
      </div>
      <button (click)="logout()" class="text-gray-400 hover:text-brand-danger transition-colors p-2 rounded-md hover:bg-red-50" title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col h-screen overflow-hidden relative pb-16 md:pb-0">
    <!-- Mobile Header -->
    <header class="md:hidden flex items-center justify-between p-4 bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
      <div class="flex items-center gap-2">
        <img src="assets/sme-logo.png" alt="SME Logo" class="h-7 object-contain">
      </div>
      <button class="text-gray-500 hover:text-brand p-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
    </header>
    
    <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around p-2 pb-safe z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
    <a routerLink="/dashboard" routerLinkActive="text-brand" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center p-2 text-gray-500 hover:text-brand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
      <span class="text-[10px] mt-1 font-medium">Home</span>
    </a>
    <a routerLink="/customers" routerLinkActive="text-brand" class="flex flex-col items-center justify-center p-2 text-gray-500 hover:text-brand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="text-[10px] mt-1 font-medium">Cust</span>
    </a>
    <a routerLink="/products" routerLinkActive="text-brand" class="flex flex-col items-center justify-center p-2 text-gray-500 hover:text-brand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>
      <span class="text-[10px] mt-1 font-medium">Prod</span>
    </a>
    <a routerLink="/stock" routerLinkActive="text-brand" class="flex flex-col items-center justify-center p-2 text-gray-500 hover:text-brand transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>
      <span class="text-[10px] mt-1 font-medium">Stock</span>
    </a>
  </nav>
</div>

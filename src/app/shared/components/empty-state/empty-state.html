<div class="flex flex-col items-center justify-center p-8 text-center bg-white rounded-lg border border-brand-muted">
  <div class="w-16 h-16 bg-brand-muted rounded-full flex items-center justify-center mb-4 text-brand">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="9" x2="15" y1="9" y2="9"/><line x1="9" x2="15" y1="15" y2="15"/></svg>
  </div>
  <h3 class="text-lg font-medium text-brand-text mb-1">{{ title() }}</h3>
  <p class="text-sm text-gray-500 mb-4">{{ message() }}</p>
  @if (actionLabel()) {
    <button (click)="action.emit()" class="px-4 py-2 bg-brand text-white rounded-md text-sm hover:bg-brand-light transition-colors">
      {{ actionLabel() }}
    </button>
  }
</div>
